<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>YT Chatbot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0d0d0f;--surface:#141417;--border:#222228;--border-light:#2e2e38;--text:#e8e8f0;--muted:#5a5a72;--accent:#ff3f3f;--accent2:#ff7a3f;--user-bg:#1a1a24;--bot-bg:#111116;--radius:10px;--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace}
    body{width:380px;height:560px;background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;display:flex;flex-direction:column;overflow:hidden}
    header{display:flex;align-items:center;gap:10px;padding:14px 16px 12px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
    .logo{width:28px;height:28px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .logo svg{width:14px;height:14px;fill:white}
    .header-text h1{font-size:13px;font-weight:500;letter-spacing:.02em;color:var(--text)}
    .header-text p{font-size:11px;color:var(--muted);font-weight:300;margin-top:1px}
    .status-dot{width:7px;height:7px;border-radius:50%;background:var(--border-light);margin-left:auto;flex-shrink:0;transition:background .4s,box-shadow .4s}
    .status-dot.ready{background:#2ecc71;box-shadow:0 0 6px #2ecc7180}
    .status-dot.loading{background:var(--accent2);box-shadow:0 0 6px #ff7a3f80;animation:pulse 1s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .url-section{padding:12px 16px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
    .url-row{display:flex;gap:8px;align-items:center}
    .url-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:8px 11px;color:var(--text);font-family:var(--mono);font-size:11px;outline:none;transition:border-color .2s;min-width:0}
    .url-input::placeholder{color:var(--muted)}
    .url-input:focus{border-color:var(--accent)}
    .load-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:7px;color:white;font-family:var(--font);font-size:11px;font-weight:500;padding:8px 14px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:opacity .2s,transform .1s}
    .load-btn:hover{opacity:.88}
    .load-btn:active{transform:scale(.97)}
    .load-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
    .url-meta{margin-top:7px;font-size:11px;color:var(--muted);min-height:14px;font-family:var(--mono);transition:color .3s}
    .url-meta.err{color:#ff5555}
    .url-meta.ok{color:#2ecc71}
    .messages{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}
    .messages::-webkit-scrollbar{width:4px}
    .messages::-webkit-scrollbar-track{background:transparent}
    .messages::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:4px}
    .empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);text-align:center;padding:20px}
    .empty-state svg{opacity:.25}
    .empty-state p{font-size:12px;line-height:1.6}
    .empty-state span{font-size:10px;opacity:.5}
    .msg{display:flex;flex-direction:column;gap:3px;animation:fadeUp .25s ease}
    @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .msg-label{font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);padding:0 4px}
    .msg.user .msg-label{color:#ff7a3f90}
    .msg.bot .msg-label{color:#ff3f3f80}
    .msg-bubble{padding:9px 12px;border-radius:var(--radius);line-height:1.55;font-size:12.5px;border:1px solid var(--border);white-space:pre-wrap;word-break:break-word}
    .msg.user .msg-bubble{background:var(--user-bg);border-color:var(--border-light);border-bottom-right-radius:3px}
    .msg.bot .msg-bubble{background:var(--bot-bg);border-bottom-left-radius:3px}
    .typing{display:flex;gap:4px;padding:11px 14px}
    .typing span{width:5px;height:5px;border-radius:50%;background:var(--muted);animation:blink 1.2s infinite}
    .typing span:nth-child(2){animation-delay:.2s}
    .typing span:nth-child(3){animation-delay:.4s}
    @keyframes blink{0%,80%,100%{opacity:.2;transform:scale(1)}40%{opacity:1;transform:scale(1.15)}}
    .input-section{padding:10px 16px 14px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
    .input-row{display:flex;gap:8px;align-items:flex-end}
    .chat-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:var(--font);font-size:12.5px;outline:none;resize:none;min-height:38px;max-height:90px;line-height:1.45;transition:border-color .2s;overflow-y:auto}
    .chat-input::placeholder{color:var(--muted)}
    .chat-input:focus{border-color:var(--border-light)}
    .chat-input:disabled{opacity:.4}
    .send-btn{width:36px;height:36px;background:var(--accent);border:none;border-radius:8px;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .2s,transform .1s}
    .send-btn:hover:not(:disabled){opacity:.85}
    .send-btn:active:not(:disabled){transform:scale(.93)}
    .send-btn:disabled{opacity:.25;cursor:not-allowed}
    .send-btn svg{width:14px;height:14px}
  </style>
</head>
<body>
<header>
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M21 3L3 10.53v.98l6.84 2.65L12.48 21h.98L21 3z"/></svg>
  </div>
  <div class="header-text">
    <h1>YT Chatbot</h1>
    <p>RAG-powered video chat</p>
  </div>
  <div class="status-dot" id="statusDot"></div>
</header>
<div class="url-section">
  <div class="url-row">
    <input class="url-input" id="urlInput" type="text" placeholder="youtube.com/watch?v=..." />
    <button class="load-btn" id="loadBtn">Load</button>
  </div>
  <div class="url-meta" id="urlMeta">Paste a YouTube URL to begin</div>
</div>
<div class="messages" id="messages">
  <div class="empty-state">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
    <p>Load a YouTube video above,<br/>then ask anything about it.</p>
    <span>Powered by LangChain · FAISS · Groq</span>
  </div>
</div>
<div class="input-section">
  <div class="input-row">
    <textarea class="chat-input" id="chatInput" placeholder="Ask about the video..." rows="1" disabled></textarea>
    <button class="send-btn" id="sendBtn" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>
<script src="popup.js"></script>
</body>
</html>
